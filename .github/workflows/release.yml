name: Release Packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_NAME: awake-mouse

jobs:
  bundle:
    name: Bundle ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundle_format: deb
            artifact_name: package-linux
          - os: windows-latest
            bundle_format: msi
            artifact_name: package-windows
          - os: macos-latest
            bundle_format: osx
            artifact_name: package-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dpkg-dev \
            libasound2-dev \
            libglib2.0-dev \
            libgtk-3-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxtst-dev

      - name: Install WiX Toolset
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install wixtoolset --no-progress -y

      - name: Install cargo-bundle
        run: cargo install cargo-bundle --locked

      - name: Build installer bundle
        run: cargo bundle --release --format ${{ matrix.bundle_format }}

      - name: Collect Linux package
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p release-assets
          find target/release/bundle/deb -maxdepth 1 -type f -name '*.deb' -exec cp {} release-assets/ \;

      - name: Collect Windows package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Get-ChildItem "target/release/bundle/msi" -Filter *.msi | Copy-Item -Destination release-assets

      - name: Collect macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p release-assets
          app_path="$(find target/release/bundle/osx -maxdepth 1 -type d -name '*.app' | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "未找到 .app 产物" >&2
            exit 1
          fi
          app_name="$(basename "$app_path")"
          tar -C "$(dirname "$app_path")" -czf "release-assets/${app_name}.tar.gz" "$app_name"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: release-assets/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: bundle
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
